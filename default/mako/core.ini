anchor=top-right
group-by=app-name,summary,body
default-timeout=5000
width=420
outer-margin=20
padding=10,15
border-size=2
max-icon-size=32
font=sans-serif 14px

[app-name=Spotify]
invisible=1

[mode=do-not-disturb]
invisible=true

[mode=do-not-disturb app-name=notify-send]
invisible=false

[urgency=critical]
default-timeout=0
layer=overlay

[summary~="Setup Wi-Fi"]
on-button-left=exec sh -c 'hyprdots-notification-dismiss "Setup Wi-Fi"; hyprdots-launch-wifi'

[summary~="Update System"]
on-button-left=exec sh -c 'hyprdots-notification-dismiss "Update System"; hyprdots-launch-floating-terminal-with-presentation hyprdots-update'

[summary~="Learn Keybindings"]
on-button-left=exec sh -c 'hyprdots-notification-dismiss "Learn Keybindings"; hyprdots-menu-keybindings'

[summary~="Install Dictation with Voxtype"]
on-button-left=exec sh -c 'hyprdots-notification-dismiss "Install Dictation with Voxtype"; hyprdots-launch-floating-terminal-with-presentation hyprdots-voxtype-install'

[summary~="Screenshot copied & saved"]
max-icon-size=80
format=<b>%s</b>\n%b
